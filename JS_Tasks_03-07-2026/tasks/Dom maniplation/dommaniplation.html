<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            text-align:center;
            font-family:Arial;
            margin-top:100px;
        }

        input{
            padding:10px;
            width:200px;
            font-size:18px;
        }

        button{
            padding:10px 20px;
            margin:10px;
            font-size:16px;
            cursor:pointer;
        }

        h1{
            font-size:50px;
            color:blue;
        }
    </style>
</body>
<h2>Countdown Timer</h2>

<input
type="number"
id="seconds"
placeholder="Enter Seconds">

<br><br>

<h1 id="timer">0</h1>

<button id="start">Start</button>
<button id="stop">Stop</button>
<button id="reset">Reset</button>

<script src="script.js"></script>

</body>
</html>
