<!DOCTYPE html>
<html>
<head>
    <title>CSS Revision</title>
    <link rel="stylesheet" href="./topics.css">
</head>

<body>

<h1 id="title">CSS Revision Assignment</h1>

<!-- Colors -->
<section class="box">
    <h2>Colors</h2>
    <p class="red">This text is red.</p>
</section>

<!-- Background -->
<section class="box background">
    <h2>Background</h2>
</section>

<!-- Border -->
<section class="box border">
    <h2>Border Example</h2>
</section>

<!-- Margin & Padding -->
<section class="box spacing">
    Margin and Padding Example
</section>

<!-- Box Model -->
<section class="box model">
    Box Model
</section>

<!-- Float -->
<section class="box">
    <img src="https://www.bing.com/images/search?view=detailV2&ccid=gc3t47uz&id=E3F3EC551A2B13D73DDEE0545CC3506E4CF04737&thid=OIP.gc3t47uzwobvIzRI_Wz-CAHaF6&mediaurl=https%3a%2f%2fpngimg.com%2fuploads%2ftom_and_jerry%2ftom_and_jerry_PNG5.png&exph=1996&expw=2500&q=tom+and+jerry&FORM=IRPRST&ck=08F871D2DDC4C3A6CCA22F1DE4A5EBC6&selectedIndex=0&itb=1 width=100px; height=100px"class="float-img">
    <p>This text wraps around the image using float.</p>
</section>

<div class="clear"></div>

<!-- Position -->
<div class="position-box">
    Relative Box
</div>

<!-- Z-index -->
<div class="parent">
    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
</div>

<!-- Opacity -->
<img src="https://www.bing.com/images/search?view=detailV2&ccid=1zMB38mb&id=8A3FF4D037B1C6BA95038714A5C36889C705F2E0&thid=OIP.1zMB38mbeT4zXt89-2cJqgHaEJ&mediaurl=https%3a%2f%2fstatic.vecteezy.com%2fsystem%2fresources%2fpreviews%2f028%2f535%2f140%2fnon_2x%2fmany-colorful-toys-collection-on-the-desk-generative-ai-photo.jpg&exph=980&expw=1749&q=toys&FORM=IRPRST&ck=694A88EE61AAEB2D45689CFD4E7DA900&selectedIndex=0&itb=0" class="opacity">

<!-- Flexbox -->
<h2>Flexbox</h2>

<div class="flex-container">
    <div>1</div>
    <div>2</div>
    <div>3</div>
</div>

<!-- Grid -->
<h2>Grid</h2>

<div class="grid-container">
    <div>A</div>
    <div>B</div>
    <div>C</div>
    <div>D</div>
    <div>E</div>
    <div>F</div>
</div>

<!-- Specificity -->
<p id="special" class="text">
    CSS Specificity Example
</p>

<!-- Alignment -->
<h2>Alignment</h2>

<div class="center-box">
    Center
</div>

</body>
