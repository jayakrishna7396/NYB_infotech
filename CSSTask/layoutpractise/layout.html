<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Assignment</title>
    <link rel="stylesheet" href="./layout.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Website</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main Layout -->
    <div class="container">

        <!-- Sidebar -->
        <aside>
            <h2>Sidebar</h2>
            <ul>
                <li>Dashboard</li>
                <li>Profile</li>
                <li>Settings</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main>
            <h2>Main Content</h2>
            <p>Welcome to the layout assignment.</p>

            <h3>Cards (Flexbox)</h3>

            <div class="cards">
                <div class="card">Card 1</div>
                <div class="card">Card 2</div>
                <div class="card">Card 3</div>
            </div>

            <h3>Grid Example</h3>

            <div class="grid">
                <div class="item">1</div>
                <div class="item">2</div>
                <div class="item">3</div>
                <div class="item">4</div>
            </div>

        </main>

    </div>

    <!-- Footer -->
    <footer>
        Copyright © 2026
    </footer>

</body>
</html>
